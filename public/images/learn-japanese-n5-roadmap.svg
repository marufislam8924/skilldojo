  <text x="190" y="348" font-size="26" fill="#fff" font-family="Arial">Kana</text>
  <text x="377" y="348" font-size="22" fill="#fff" font-family="Arial">Vocab</text>
  <text x="585" y="348" font-size="24" fill="#fff" font-family="Arial">Grammar</text>
  <text x="790" y="348" font-size="24" fill="#fff" font-family="Arial">Listen</text>
  <text x="985" y="348" font-size="24" fill="#fff" font-family="Arial">Exam</text>
  <text x="160" y="440" font-size="24" fill="#334155" font-family="Arial">Step by step progress from zero to JLPT N5 readiness</text>
