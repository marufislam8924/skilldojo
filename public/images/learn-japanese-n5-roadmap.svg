  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect x="60" y="70" width="1080" height="560" rx="26" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="100" y="135" font-size="40" font-family="Arial, sans-serif" fill="#0f172a" font-weight="700">Learn Japanese N5 Roadmap</text>
  <line x1="150" y1="340" x2="1050" y2="340" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
  <circle cx="220" cy="340" r="55" fill="#14b8a6"/>
  <circle cx="430" cy="340" r="55" fill="#0ea5e9"/>
  <circle cx="640" cy="340" r="55" fill="#6366f1"/>
  <circle cx="850" cy="340" r="55" fill="#f59e0b"/>
